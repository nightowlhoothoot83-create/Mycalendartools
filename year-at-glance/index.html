  <script>document.getElementById('brand-strip').innerHTML=renderBrandStrip();document.getElementById('nav').innerHTML=renderNav();document.getElementById('site-footer').innerHTML=renderSiteFooter();document.getElementById('group-footer').innerHTML=renderGroupFooter();</script>
  <script>
    var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var dayLetters=['S','M','T','W','T','F','S'];
    document.addEventListener('DOMContentLoaded',function(){document.getElementById('yagYear').value=new Date().getFullYear();genYear();});
    function genYear(){
      var y=parseInt(document.getElementById('yagYear').value);
      var today=new Date();
      var html='';
      for(var m=0;m<12;m++){
        var firstDay=new Date(y,m,1).getDay();
        var dim=new Date(y,m+1,0).getDate();
        html+='<div class="mini-month card"><div class="mini-month-title">'+monthNames[m]+'</div><div class="mini-cal">';
        html+=dayLetters.map(function(d){return '<div class="mini-cal-day header">'+d+'</div>';}).join('');
        for(var i=0;i<firstDay;i++)html+='<div class="mini-cal-day"></div>';
        for(var d=1;d<=dim;d++){
          var isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          html+='<div class="mini-cal-day'+(isToday?' today':'')+'">'+d+'</div>';
        }
        html+='</div></div>';
      }
      document.getElementById('yearGrid').innerHTML=html;
    }
    </script>
