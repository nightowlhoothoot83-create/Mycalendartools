<script type="application/ld+json">{"@context": "https://schema.org", "@type": "WebApplication", "name": "Year at a Glance Calendar", "url": "https://www.mycalendartools.net/year-at-glance/", "description": "All 12 months in one view", "applicationCategory": "UtilitiesApplication", "operatingSystem": "Any", "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"}, "publisher": {"@type": "Organization", "name": "Ascension Digital Group"}}</script>

<body>
  <div id="brand-strip"></div>
  <div id="cookie-consent-mount"></div><div id="nav"></div>
  <section class="page-hero container">
    <div class="page-hero-icon" style="background:linear-gradient(135deg,rgba(6,214,255,0.12),rgba(139,92,246,0.12));border:1px solid rgba(6,214,255,0.2)">&#128202;</div>
    <h1>Year at a Glance</h1><p>View all 12 months of any year in one compact calendar.</p>
  </section>
  <div class="container" style="padding-bottom:40px;position:relative;z-index:1">
    <div style="display:flex;gap:12px;align-items:flex-end;margin-bottom:24px;flex-wrap:wrap">
      <div class="form-group" style="margin:0"><label>Year</label><input type="number" id="yagYear" value="2025" min="1900" max="2100" style="width:110px"></div>
      <button class="btn-primary" onclick="genYear()">View Year</button>
      <button class="btn-secondary" onclick="window.print()">&#128424; Print</button>
    </div>
    <div class="year-grid" id="yearGrid"></div>
  </div>
  <div class="ad-rectangle container"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1904958390525375" data-ad-format="auto" data-full-width-responsive="true"></ins><script>try{(adsbygoogle = window.adsbygoogle || []).push({});}catch(e){}</script></div>
  <div id="site-footer"></div><div id="group-footer"></div>
  <script src="/components.js"></script>
  <script>document.getElementById('brand-strip').innerHTML=renderBrandStrip();document.getElementById('cookie-consent-mount').innerHTML=renderCookieConsent();document.getElementById('nav').innerHTML=renderNav();document.getElementById('site-footer').innerHTML=renderSiteFooter();document.getElementById('group-footer').innerHTML=renderGroupFooter();</script>
  <script>
    var monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var dayLetters=['S','M','T','W','T','F','S'];
    document.addEventListener('DOMContentLoaded',function(){document.getElementById('yagYear').value=new Date().getFullYear();genYear();});
    function genYear(){
      var y=parseInt(document.getElementById('yagYear').value);
      var today=new Date();
      var html='';
      for(var m=0;m<12;m++){
        var firstDay=new Date(y,m,1).getDay();
        var dim=new Date(y,m+1,0).getDate();
        html+='<div class="mini-month card"><div class="mini-month-title">'+monthNames[m]+'</div><div class="mini-cal">';
        html+=dayLetters.map(function(d){return '<div class="mini-cal-day header">'+d+'</div>';}).join('');
        for(var i=0;i<firstDay;i++)html+='<div class="mini-cal-day"></div>';
        for(var d=1;d<=dim;d++){
          var isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
          html+='<div class="mini-cal-day'+(isToday?' today':'')+'">'+d+'</div>';
        }
        html+='</div></div>';
      }
      document.getElementById('yearGrid').innerHTML=html;
    }
    </script>
</body></html>
