    <h1>Birthday Countdown</h1>
    <p>Enter any birthday to see a live countdown to the next celebration.</p>
  </section>
  <div class="container" style="padding-bottom:40px;position:relative;z-index:1">
    <div style="max-width:600px;margin:0 auto">
      <div class="card" style="padding:28px;margin-bottom:20px">
        <div class="form-group"><label>Whose Birthday?</label><input type="text" id="bdName" placeholder="e.g. Mum" value="Your Birthday"></div>
        <div class="form-group"><label>Date of Birth</label><input type="date" id="bdDob"></div>
        <button class="btn-primary" onclick="calcBday()" style="width:100%;justify-content:center">Count Down!</button>
      </div>
      <div class="card" style="padding:32px;text-align:center;display:none" id="bdResult">
        <div style="font-size:0.82rem;color:var(--dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px" id="bdLabel"></div>
        <div style="font-family:Syne,sans-serif;font-size:5rem;font-weight:800;color:var(--pink);line-height:1" id="bdDays"></div>
        <div style="font-size:1rem;color:var(--muted);margin-bottom:16px">days away</div>
        <div style="font-size:0.88rem;color:var(--muted)" id="bdDate"></div>
        <div style="margin-top:14px;font-size:0.9rem;color:var(--accent)" id="bdAge"></div>
      </div>
    </div>
  </div>
<div class="ad-rectangle container">

  <script>
    document.getElementById('brand-strip').innerHTML = renderBrandStrip();
    document.getElementById('nav').innerHTML = renderNav();
    document.getElementById('site-footer').innerHTML = renderSiteFooter();
    document.getElementById('group-footer').innerHTML = renderGroupFooter();
  </script>
  <script>
    document.addEventListener('DOMContentLoaded',function(){
      var d=new Date();d.setFullYear(d.getFullYear()-25);
      document.getElementById('bdDob').value=d.toISOString().split('T')[0];
    });
    function calcBday(){
      var dob=new Date(document.getElementById('bdDob').value);
      if(isNaN(dob))return;
      var name=document.getElementById('bdName').value||'Birthday';
      var now=new Date();
      var next=new Date(now.getFullYear(),dob.getMonth(),dob.getDate());
      if(next<=now)next.setFullYear(now.getFullYear()+1);
      var days=Math.ceil((next-now)/86400000);
      var age=next.getFullYear()-dob.getFullYear();
      document.getElementById('bdResult').style.display='block';
      document.getElementById('bdLabel').textContent=name+"'s next birthday";
      document.getElementById('bdDays').textContent=days;
      document.getElementById('bdDate').textContent=next.toLocaleDateString('en-AU',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
      document.getElementById('bdAge').textContent='Turning '+age+' years old';
    }
  </script>
