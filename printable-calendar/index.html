  <script>document.getElementById('brand-strip').innerHTML=renderBrandStrip();document.getElementById('nav').innerHTML=renderNav();document.getElementById('site-footer').innerHTML=renderSiteFooter();document.getElementById('group-footer').innerHTML=renderGroupFooter();</script>
  <script>
    var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    document.addEventListener('DOMContentLoaded',function(){
      var n=new Date();
      document.getElementById('calMonth').value=n.getMonth();
      document.getElementById('calYear').value=n.getFullYear();
      genCal();
    });
    function genCal(){
      var m=parseInt(document.getElementById('calMonth').value);
      var y=parseInt(document.getElementById('calYear').value);
      var today=new Date();
      document.getElementById('calTitle').textContent=months[m]+' '+y;
      var firstDay=new Date(y,m,1).getDay();
      var daysInMonth=new Date(y,m+1,0).getDate();
      var html=days.map(function(d){return '<div class="cal-day-header">'+d+'</div>';}).join('');
      for(var i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
      for(var d=1;d<=daysInMonth;d++){
        var isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
        html+='<div class="cal-day'+(isToday?' today':'')+'">'+d+'</div>';
      }
      document.getElementById('calGrid').innerHTML=html;
    }
    </script>
