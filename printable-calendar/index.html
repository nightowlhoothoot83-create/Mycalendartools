<script type="application/ld+json">{"@context": "https://schema.org", "@type": "WebApplication", "name": "Printable Calendar", "url": "https://www.mycalendartools.net/printable-calendar/", "description": "Generate and print a calendar", "applicationCategory": "UtilitiesApplication", "operatingSystem": "Any", "offers": {"@type": "Offer", "price": "0", "priceCurrency": "USD"}, "publisher": {"@type": "Organization", "name": "Ascension Digital Group"}}</script>
</head>
<body>
  <div id="brand-strip"></div>
  <div id="cookie-consent-mount"></div><div id="nav"></div>
  <section class="page-hero container">
    <div class="page-hero-icon" style="background:linear-gradient(135deg,rgba(6,214,255,0.12),rgba(139,92,246,0.12));border:1px solid rgba(6,214,255,0.2)">&#128424;</div>
    <h1>Printable Calendar</h1><p>Generate a clean printable calendar for any month or year.</p>
  </section>
  <div class="container" style="padding-bottom:40px;position:relative;z-index:1">
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end">
      <div class="form-group" style="margin:0"><label>Month</label><select id="calMonth" style="width:auto"><option value="0">January</option><option value="1">February</option><option value="2">March</option><option value="3">April</option><option value="4">May</option><option value="5">June</option><option value="6">July</option><option value="7">August</option><option value="8">September</option><option value="9">October</option><option value="10">November</option><option value="11">December</option></select></div>
      <div class="form-group" style="margin:0"><label>Year</label><input type="number" id="calYear" value="2025" min="1900" max="2100" style="width:100px"></div>
      <button class="btn-primary" onclick="genCal()">Generate</button>
      <button class="btn-secondary" onclick="window.print()">&#128424; Print</button>
    </div>
    <div class="card" style="padding:24px" id="calWrap">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
        <h2 style="font-size:1.5rem" id="calTitle"></h2>
      </div>
      <div class="calendar-grid-wrap">
        <div class="cal-grid" id="calGrid"></div>
      </div>
    </div>
  </div>
  <div class="ad-rectangle container"><ins class="adsbygoogle" style="display:block" data-ad-client="ca-pub-1904958390525375" data-ad-format="auto" data-full-width-responsive="true"></ins><script>try{(adsbygoogle = window.adsbygoogle || []).push({});}catch(e){}</script></div>
  <div id="site-footer"></div><div id="group-footer"></div>
  <script src="/components.js"></script>
  <script>document.getElementById('brand-strip').innerHTML=renderBrandStrip();document.getElementById('cookie-consent-mount').innerHTML=renderCookieConsent();document.getElementById('nav').innerHTML=renderNav();document.getElementById('site-footer').innerHTML=renderSiteFooter();document.getElementById('group-footer').innerHTML=renderGroupFooter();</script>
  <script>
    var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
    var days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    document.addEventListener('DOMContentLoaded',function(){
      var n=new Date();
      document.getElementById('calMonth').value=n.getMonth();
      document.getElementById('calYear').value=n.getFullYear();
      genCal();
    });
    function genCal(){
      var m=parseInt(document.getElementById('calMonth').value);
      var y=parseInt(document.getElementById('calYear').value);
      var today=new Date();
      document.getElementById('calTitle').textContent=months[m]+' '+y;
      var firstDay=new Date(y,m,1).getDay();
      var daysInMonth=new Date(y,m+1,0).getDate();
      var html=days.map(function(d){return '<div class="cal-day-header">'+d+'</div>';}).join('');
      for(var i=0;i<firstDay;i++)html+='<div class="cal-day empty"></div>';
      for(var d=1;d<=daysInMonth;d++){
        var isToday=d===today.getDate()&&m===today.getMonth()&&y===today.getFullYear();
        html+='<div class="cal-day'+(isToday?' today':'')+'">'+d+'</div>';
      }
      document.getElementById('calGrid').innerHTML=html;
    }
    </script>
</body></html>
