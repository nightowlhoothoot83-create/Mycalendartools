<body>
  <div id="brand-strip"></div>

  <div id="nav"></div>
  <nav class="breadcrumb container"><a href="/">Home</a> <span class="breadcrumb-sep">›</span> <span class="breadcrumb-current">World Clock</span></nav>
  <section class="page-hero container">
    <div class="page-hero-icon" style="background:linear-gradient(135deg,rgba(96,165,250,0.15),rgba(6,214,255,0.15));border:1px solid rgba(96,165,250,0.2)">🕰️</div>
    <h1>World Clock</h1>
    <p>Live city clocks in the same clean MyCalendarTools style.</p>

  <div class="tool-layout container">
    <div class="tool-card card">
      <div class="form-group"><label>Add a city/time zone</label><select id="zoneSelect"><option value="Australia/Brisbane|Brisbane">Brisbane</option><option value="Australia/Sydney|Sydney">Sydney</option><option value="Pacific/Auckland|Auckland">Auckland</option><option value="Asia/Tokyo|Tokyo">Tokyo</option><option value="Asia/Dubai|Dubai">Dubai</option><option value="Europe/London|London">London</option><option value="Europe/Paris|Paris">Paris</option><option value="America/New_York|New York">New York</option><option value="America/Los_Angeles|Los Angeles">Los Angeles</option></select></div>
      <button class="btn-primary" onclick="addZone()" style="width:100%;justify-content:center">Add Clock</button>
      <p class="tool-note">Uses your browser’s time zone data, including daylight saving where supported.</p>
    </div>
    <div class="tool-card card"><h2 style="font-size:1.2rem;margin-bottom:10px">Live clocks</h2><div id="clockGrid" class="inline-tool-row"></div></div>
  </div>

  <section class="related-tools container"><h2>Related Tools</h2><div class="related-grid"><a href="/time-zone/" class="related-card card"><span class="related-card-icon">🌍</span>Time Zone Converter</a><a href="/countdown/" class="related-card card"><span class="related-card-icon">⏳</span>Countdown</a><a href="/date-calculator/" class="related-card card"><span class="related-card-icon">🗓️</span>Date Calculator</a><a href="/week-number/" class="related-card card"><span class="related-card-icon">🔢</span>Week Number</a></div></section>

  <script>
    document.getElementById('brand-strip').innerHTML = renderBrandStrip();
    document.getElementById('cookie-consent-mount').innerHTML = renderCookieConsent();
    document.getElementById('nav').innerHTML = renderNav();
    document.getElementById('site-footer').innerHTML = renderSiteFooter();
    document.getElementById('group-footer').innerHTML = renderGroupFooter();
    initFAQ(); initHamburger();
  </script>
  <script>
const clocks=[['Australia/Brisbane','Brisbane'],['Australia/Sydney','Sydney'],['Pacific/Auckland','Auckland'],['Asia/Tokyo','Tokyo'],['Europe/London','London'],['America/New_York','New York']];
function renderClocks(){const now=new Date();document.getElementById('clockGrid').innerHTML=clocks.map(([tz,city])=>`<div class="mini-result-card"><strong>${now.toLocaleTimeString('en-AU',{timeZone:tz,hour:'2-digit',minute:'2-digit',second:'2-digit'})}</strong><span>${city}</span><span>${now.toLocaleDateString('en-AU',{timeZone:tz,weekday:'short',day:'numeric',month:'short'})}</span></div>`).join('');}
function addZone(){const [tz,city]=document.getElementById('zoneSelect').value.split('|'); if(!clocks.some(c=>c[0]===tz)) clocks.push([tz,city]); renderClocks();}
renderClocks(); setInterval(renderClocks,1000);
</script>
